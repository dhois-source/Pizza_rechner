<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pizza Rechner</title>
<style>
body{margin:0;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.wrap{max-width:480px;margin:auto;padding:16px}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1{text-align:center}label{font-weight:600;display:block;margin:10px 0 6px}
input{width:100%;padding:14px;font-size:20px;box-sizing:border-box;border-radius:12px;border:1px solid #ccc}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;font-size:18px}
.row:last-child{border-bottom:none}.name{font-weight:600}.val{font-weight:700}
.total{font-size:22px;font-weight:700;color:#d35400}
</style></head><body><div class="wrap">
<h1>🍕 Pizza Rechner 🍕</h1>
<div class="card">
<label>Anzahl Pizzen</label><input id="anzahl" type="number" value="4" min="1">
<label>Teiggewicht pro Pizza (g)</label><input id="gewicht" type="number" value="260" min="100">
</div>
<div class="card" id="out"></div>
</div>
<script>
const b={mehl:640,w1:290,h:0.5,w2:125,s:18},bt=1040;
function g(x){return x.toFixed(1).replace(".",",")+" g";}
function r(){
let a=+anzahl.value,w=+gewicht.value,f=a*w/bt;
let m=b.mehl*f,w1=b.w1*f,h=b.h*f,w2=b.w2*f,s=b.s*f,t=m+w1+h+w2+s;
out.innerHTML=`
<div class=row><div class=name>Mehl 14</div><div class=val>${g(m)}</div></div>
<div class=row><div class=name>Wasser (Biga)</div><div class=val>${g(w1)}</div></div>
<div class=row><div class=name>Frischhefe</div><div class=val>${g(h)}</div></div>
<div class=row><div class=name>Wasser (Hauptteig)</div><div class=val>${g(w2)}</div></div>
<div class=row><div class=name>Salz</div><div class=val>${g(s)}</div></div>
<div class="row total"><div>Gesamtteig</div><div>${g(t)}</div></div>`;}
anzahl.oninput=r;gewicht.oninput=r;r();
</script></body></html>
